name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64, win-x86, win-arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk --version 1.0.1

      - name: Restore
        run: dotnet restore FullCompo.sln

      - name: Publish
        run: dotnet publish FullCompo.App/FullCompo.App.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o ./publish/${{ matrix.rid }}

      - name: Pack with Velopack
        shell: pwsh
        run: |
          $version = "1.0.${{ github.run_number }}"
          vpk pack `
            --packId FullCompo `
            --packVersion $version `
            --packDir ./publish/${{ matrix.rid }} `
            --mainExe FullCompo.exe `
            --outputDir ./releases/${{ matrix.rid }} `
            --runtime ${{ matrix.rid }} `
            --channel ${{ matrix.rid }}

      - name: Prepare release zip (ClassIsland-style structure)
        shell: pwsh
        run: |
          $portableZip = Get-ChildItem ./releases/${{ matrix.rid }}/*-Portable.zip | Select-Object -First 1
          if ($portableZip) {
            $dest = "./dist/FullCompo-${{ matrix.rid }}"
            New-Item -ItemType Directory -Force -Path $dest
            Expand-Archive -Path $portableZip.FullName -DestinationPath $dest -Force
            Write-Host "Extracted portable zip to $dest"
            Get-ChildItem $dest -Recurse | ForEach-Object { Write-Host $_.FullName }
            $zipPath = "./dist/FullCompo-${{ matrix.rid }}.zip"
            Compress-Archive -Path "$dest\*" -DestinationPath $zipPath -Force
            Write-Host "Created release zip: $zipPath"
          } else {
            Write-Error "Portable zip not found!"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FullCompo-${{ matrix.rid }}
          path: ./dist/FullCompo-${{ matrix.rid }}.zip

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          tag_name: nightly
          name: Nightly Build
          draft: false
          prerelease: true
          files: ./dist/FullCompo-${{ matrix.rid }}.zip
          body: |
            Automated nightly build from commit ${{ github.sha }}.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
